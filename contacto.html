<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto · Miércorres Running Club</title>
  <meta name="description" content="Escribe al Miércorres Running Club de Totana. Te responderemos lo antes posible.">
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div data-header></div>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow">Contacto</span>
        <h1>Hablemos</h1>
        <p>¿Quieres unirte, colaborar o simplemente saludar? Rellena el formulario y te responderemos lo antes posible.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="form-wrap">
          <!-- El envío lo gestiona js/form.js contra un Google Apps Script (ver README) -->
          <form id="contact-form" novalidate>
            <div class="form-grid">
              <div class="field">
                <label for="nombre">Nombre <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="nombre" name="nombre" autocomplete="given-name" required>
              </div>
              <div class="field">
                <label for="apellidos">Apellidos <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="apellidos" name="apellidos" autocomplete="family-name" required>
              </div>
              <div class="field field--full">
                <label for="email">Correo electrónico <span class="req" aria-hidden="true">*</span></label>
                <input type="email" id="email" name="email" autocomplete="email" required>
              </div>
              <div class="field field--full">
                <label for="asunto">Asunto <span class="req" aria-hidden="true">*</span></label>
                <input type="text" id="asunto" name="asunto" required>
              </div>
              <div class="field field--full">
                <label for="mensaje">Mensaje <span class="req" aria-hidden="true">*</span></label>
                <textarea id="mensaje" name="mensaje" required></textarea>
              </div>
            </div>

            <!-- Campo trampa anti-spam (honeypot): debe quedar vacío -->
            <div class="visually-hidden" aria-hidden="true">
              <label for="website">No rellenar</label>
              <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn--primary" id="submit-btn">Enviar mensaje</button>
              <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
            </div>
            <p class="form-hint">Los campos marcados con <span class="req">*</span> son obligatorios. Tu mensaje se enviará al equipo del club por correo.</p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div data-footer></div>
  <script src="js/main.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
